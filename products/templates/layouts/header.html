<!--begin::Header-->
<nav class="app-header navbar navbar-expand bg-body">
  <!--begin::Container-->
  <div class="container-fluid">
    <!--begin::Start Navbar Links-->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
          <i class="bi bi-list"></i>
        </a>
      </li>
    </ul>
    <!--end::Start Navbar Links-->
    <!--begin::End Navbar Links-->
    <ul class="navbar-nav ms-auto">
      <li class="nav-item dropdown" id="notification-center" data-summary-url="{% url 'notification_summary' %}">
        <a href="#" class="nav-link position-relative" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-bell fs-5"></i>
          <span id="notification-badge" class="navbar-badge badge text-bg-danger" style="display:none;">0</span>
        </a>
        <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0" style="min-width: 360px;">
          <div class="dropdown-header d-flex justify-content-between align-items-center px-3 py-2">
            <span class="fw-semibold">Takeout Notifications</span>
            <span id="notification-dropdown-count" class="badge text-bg-secondary">0</span>
          </div>
          <div id="notification-dropdown-body">
            <div class="px-3 py-4 text-center text-body-secondary small">
              <div class="spinner-border spinner-border-sm me-2" role="status"></div>Loading...
            </div>
          </div>
          <div class="dropdown-footer d-flex justify-content-between gap-2 px-3 py-2 border-top">
            <a href="{% url 'notification_list' %}" class="btn btn-sm btn-outline-primary w-100">
              <i class="bi bi-list-ul me-1"></i>View All
            </a>
          </div>
        </div>
      </li>
      <!--begin::Fullscreen Toggle-->
      <li class="nav-item">
        <a class="nav-link" href="#" data-lte-toggle="fullscreen">
          <i data-lte-icon="maximize" class="bi bi-arrows-fullscreen"></i>
          <i data-lte-icon="minimize" class="bi bi-fullscreen-exit" style="display: none"></i>
        </a>
      </li>
      <!--end::Fullscreen Toggle-->
      <!--begin::User Menu Dropdown-->
      <li class="nav-item dropdown user-menu">
        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
          <span class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-5"></i>
            <span class="d-none d-md-inline">
              {{ user.get_full_name|default:user.username }}
            </span>
          </span>
        </a>
        <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end">
          <!--begin::User Image-->
          <li class="user-header text-bg-primary">
            <i class="bi bi-person-circle" style="font-size: 4rem;"></i>
            <p>
              {{ user.get_full_name|default:user.username }}
              <small>{{ user.email|default:"" }}</small>
            </p>
          </li>
          <!--end::User Image-->

          <!--begin::Menu Footer-->
          <li class="user-footer">
            <form method="post" action="{% url 'logout' %}" class="d-inline float-end">
              {% csrf_token %}
              <button type="submit" class="btn btn-default btn-flat">
                <i class="bi bi-box-arrow-right me-1"></i>Sign out
              </button>
            </form>
          </li>
          <!--end::Menu Footer-->
        </ul>
      </li>
      <!--end::User Menu Dropdown-->
    </ul>
    <!--end::End Navbar Links-->
  </div>
  <!--end::Container-->
</nav>
<!--end::Header-->
