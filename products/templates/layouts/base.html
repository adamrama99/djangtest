{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} | My Shop</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
    crossorigin="anonymous" />

  <!-- OverlayScrollbars -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
    crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />

  <!-- AdminLTE 4 CSS -->
  <link rel="stylesheet" href="{% static 'AdminLTE4/dist/css/adminlte.min.css' %}" />

  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
  <style>
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection {
      background-color: #212529; border-color: #495057; color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--single .select2-selection__rendered {
      color: #e9ecef !important;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--single .select2-selection__placeholder {
      color: #6c757d !important;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection__clear {
      color: #adb5bd;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-dropdown {
      background-color: #212529; border-color: #495057; color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-results__option {
      color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-results__option--highlighted {
      background-color: #0d6efd; color: #fff;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-search__field {
      background-color: #2b3035; color: #e9ecef; border-color: #495057;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--multiple .select2-selection__choice {
      background-color: #495057; border-color: #6c757d; color: #e9ecef;
    }
    #notification-dropdown-body {
      max-height: 420px;
      overflow-y: auto;
    }
    .urgent-toast {
      min-width: 340px;
      border-left: 4px solid #dc3545;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body class="layout-fixed sidebar-mini sidebar-expand-lg {% if request.resolver_match.url_name == 'dashboard' %}sidebar-collapse{% else %}sidebar-open{% endif %} bg-body-tertiary">
  <!--begin::App Wrapper-->
  <div class="app-wrapper">

    <!--begin::Header-->
    {% include "layouts/header.html" %}
    <!--end::Header-->

    <!--begin::Sidebar-->
    {% include "layouts/sidebar.html" %}
    <!--end::Sidebar-->

    <!--begin::App Main-->
    <main class="app-main">
      <!--begin::App Content-->
      <div class="app-content">
        <div class="container-fluid">
          {% block content %}{% endblock %}
        </div>
      </div>
      <!--end::App Content-->
    </main>
    <!--end::App Main-->

    <!--begin::Footer-->
    <footer class="app-footer">
      <div class="float-end d-none d-sm-inline">My Shop Admin</div>
      <strong>Powered by <a href="https://adminlte.io" target="_blank">AdminLTE 4</a></strong>
    </footer>
    <!--end::Footer-->

  </div>
  <!--end::App Wrapper-->

  <div id="urgent-toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <!-- OverlayScrollbars JS -->
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es5.min.js"
    crossorigin="anonymous"></script>

  <!-- Bootstrap 5 JS (required by AdminLTE 4) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <!-- AdminLTE 4 JS -->
  <script src="{% static 'AdminLTE4/dist/js/adminlte.min.js' %}"></script>

  <!-- jQuery + Select2 JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script>
    (function () {
      const notificationCenter = document.getElementById('notification-center');
      if (!notificationCenter) return;

      const summaryUrl = notificationCenter.dataset.summaryUrl;
      const dropdownBody = document.getElementById('notification-dropdown-body');
      const badge = document.getElementById('notification-badge');
      const countBadge = document.getElementById('notification-dropdown-count');
      const toastContainer = document.getElementById('urgent-toast-container');
      let urgentNotifications = [];

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function updateBadges(total) {
        countBadge.textContent = total;
        if (total > 0) {
          badge.style.display = 'inline-flex';
          badge.textContent = total;
        } else {
          badge.style.display = 'none';
          badge.textContent = '0';
        }
      }

      function showUrgentToasts() {
        if (!urgentNotifications.length) return;

        urgentNotifications.forEach((notification) => {
          const toastEl = document.createElement('div');
          toastEl.className = 'toast urgent-toast text-bg-dark border-0';
          toastEl.role = 'alert';
          toastEl.ariaLive = 'assertive';
          toastEl.ariaAtomic = 'true';
          toastEl.innerHTML = `
            <div class="toast-header bg-danger text-white border-0">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <strong class="me-auto">${escapeHtml(notification.title)}</strong>
              <small>${escapeHtml(notification.offset_display)}</small>
              <button type="button" class="btn-close btn-close-white ms-2" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
              <div class="fw-semibold mb-1">${escapeHtml(notification.time_status)}</div>
              <div class="small">${escapeHtml(notification.message)}</div>
              <a href="${escapeHtml(notification.detail_url)}" class="btn btn-sm btn-light mt-3">
                <i class="bi bi-eye-fill me-1"></i>Buka Jadwal
              </a>
            </div>
          `;
          toastContainer.appendChild(toastEl);
          toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
          const toast = new bootstrap.Toast(toastEl, { delay: 8000, autohide: true });
          toast.show();
        });
      }

      function loadNotificationSummary() {
        fetch(summaryUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
          .then((response) => response.json())
          .then((data) => {
            dropdownBody.innerHTML = data.html;
            urgentNotifications = data.urgent_notifications || [];
            updateBadges(data.count || 0);
          })
          .catch(() => {
            dropdownBody.innerHTML = `
              <div class="px-3 py-4 text-center text-danger small">
                <i class="bi bi-exclamation-circle d-block fs-3 mb-2"></i>
                Gagal memuat notifikasi.
              </div>
            `;
          });
      }

      loadNotificationSummary();
      window.setInterval(loadNotificationSummary, 10000);
      window.setInterval(showUrgentToasts, 12000);
      window.setTimeout(showUrgentToasts, 2000);
    })();
  </script>

  {% block extra_js %}{% endblock %}
</body>

</html>
