{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} | My Shop</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
    crossorigin="anonymous" />

  <!-- OverlayScrollbars -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
    crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />

  <!-- AdminLTE 4 CSS -->
  <link rel="stylesheet" href="{% static 'AdminLTE4/dist/css/adminlte.min.css' %}" />

  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
  <style>
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection {
      background-color: #212529; border-color: #495057; color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--single .select2-selection__rendered {
      color: #e9ecef !important;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--single .select2-selection__placeholder {
      color: #6c757d !important;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection__clear {
      color: #adb5bd;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-dropdown {
      background-color: #212529; border-color: #495057; color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-results__option {
      color: #e9ecef;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-results__option--highlighted {
      background-color: #0d6efd; color: #fff;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-search__field {
      background-color: #2b3035; color: #e9ecef; border-color: #495057;
    }
    [data-bs-theme="dark"] .select2-container--bootstrap-5 .select2-selection--multiple .select2-selection__choice {
      background-color: #495057; border-color: #6c757d; color: #e9ecef;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
  <!--begin::App Wrapper-->
  <div class="app-wrapper">

    <!--begin::Header-->
    {% include "layouts/header.html" %}
    <!--end::Header-->

    <!--begin::Sidebar-->
    {% include "layouts/sidebar.html" %}
    <!--end::Sidebar-->

    <!--begin::App Main-->
    <main class="app-main">
      <!--begin::App Content-->
      <div class="app-content">
        <div class="container-fluid">
          {% block content %}{% endblock %}
        </div>
      </div>
      <!--end::App Content-->
    </main>
    <!--end::App Main-->

    <!--begin::Footer-->
    <footer class="app-footer">
      <div class="float-end d-none d-sm-inline">My Shop Admin</div>
      <strong>Powered by <a href="https://adminlte.io" target="_blank">AdminLTE 4</a></strong>
    </footer>
    <!--end::Footer-->

  </div>
  <!--end::App Wrapper-->

  <!-- OverlayScrollbars JS -->
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es5.min.js"
    crossorigin="anonymous"></script>

  <!-- Bootstrap 5 JS (required by AdminLTE 4) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <!-- AdminLTE 4 JS -->
  <script src="{% static 'AdminLTE4/dist/js/adminlte.min.js' %}"></script>

  <!-- jQuery + Select2 JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  {% block extra_js %}{% endblock %}
</body>

</html>
