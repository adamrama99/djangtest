<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CRUD{% endblock %}</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1a2b; --text:#e5e7eb; --muted:#9ca3af; --line:#1f2a44; }
    :root { --primary:#22c55e; --danger:#ef4444; --warning:#f59e0b; --link:#60a5fa; }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: linear-gradient(180deg, #070b14, var(--bg));
      color: var(--text);
    }
    a{ color: var(--link); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .container{ max-width: 980px; margin: 32px auto; padding: 0 16px; }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 16px; border: 1px solid var(--line);
      background: rgba(15,26,43,.9); border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .brand{ font-weight: 700; letter-spacing:.2px; }
    .muted{ color: var(--muted); font-size: 14px; }

    .card{
      margin-top: 16px;
      border: 1px solid var(--line);
      background: rgba(15,26,43,.9);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .btn{
      display:inline-flex; align-items:center; gap:8px;
      padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1426; color: var(--text);
      cursor:pointer; font-weight:600;
    }
    .btn:hover{ filter: brightness(1.1); text-decoration:none; }
    .btn-primary{ background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.35); }
    .btn-danger{ background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); }
    .btn-ghost{ background: transparent; }

    .actions{ display:flex; gap:8px; flex-wrap:wrap; }

    table{ width:100%; border-collapse: collapse; overflow:hidden; border-radius: 12px; }
    th, td{ padding: 12px 10px; border-bottom: 1px solid var(--line); text-align:left; }
    th{ font-size: 13px; text-transform: uppercase; letter-spacing:.08em; color: var(--muted); }
    tr:hover td{ background: rgba(96,165,250,.06); }

    .badge{
      display:inline-block; padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--muted); font-size: 12px;
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px){ .grid{ grid-template-columns: 1fr; } }

    input, textarea{
      width:100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1426;
      color: var(--text);
      outline: none;
    }
    textarea{ min-height: 110px; resize: vertical; }
    label{ display:block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
    .field{ margin-bottom: 12px; }
    .errorlist{ margin:6px 0 0; padding-left: 18px; color: #fca5a5; font-size: 13px; }

    .flash{
      margin-top: 12px; padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(96,165,250,.10);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="brand">Django CRUD</div>
      </div>
      <div class="actions">
        <a class="btn btn-primary" href="{% url 'product_create' %}">+ Create</a>
        <a class="btn btn-ghost" href="{% url 'product_list' %}">List</a>
      </div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
