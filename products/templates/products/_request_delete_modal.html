<div class="modal-header bg-danger text-white">
    <h5 class="modal-title">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Delete Request
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
    <p>Are you sure you want to delete the documentation request for <strong>"{{ request_obj.brand_materi }}"</strong>?</p>
    <p class="text-danger small mb-0">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>This action cannot be undone.
    </p>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
        <i class="bi bi-arrow-left me-1"></i> Cancel
    </button>
    <form method="post" id="modal-form" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash-fill me-1"></i> Yes, Delete Request
        </button>
    </form>
</div>
