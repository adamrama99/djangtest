{% extends "products/base.html" %}
{% block title %}Delete{% endblock %}

{% block content %}
  <h1 style="margin:0 0 6px;">Delete Product</h1>
  <div class="muted">Aksi ini tidak bisa dibatalkan.</div>

  <div style="height:14px;"></div>

  <div style="padding:12px; border:1px solid var(--line); border-radius:12px; background: rgba(239,68,68,.08);">
    Yakin hapus <b>{{ product.name }}</b>?
  </div>

  <form method="post" style="margin-top: 12px;">
    {% csrf_token %}
    <div class="actions">
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn btn-ghost" href="{% url 'product_list' %}">Cancel</a>
    </div>
  </form>
{% endblock %}
