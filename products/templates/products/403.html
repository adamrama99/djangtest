{% extends "layouts/base.html" %}
{% block title %}Akses Ditolak{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow text-center" style="border-radius: 1rem;">
            <div class="card-body py-5 px-4">
                <div class="mb-4">
                    <i class="bi bi-shield-lock display-1 text-danger"></i>
                </div>
                <h2 class="fw-bold mb-2">Akses Ditolak</h2>
                <p class="text-muted mb-4">{{ message|default:"Anda tidak memiliki izin untuk mengakses halaman ini. Silakan hubungi administrator jika Anda merasa ini adalah kesalahan." }}</p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="javascript:history.back()" class="btn btn-secondary px-4">
                        <i class="bi bi-arrow-left me-1"></i> Kembali
                    </a>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary px-4">
                        <i class="bi bi-house me-1"></i> Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
