{% extends "layouts/base.html" %}
{% block title %}Delete Jadwal Tayang{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card card-danger card-outline">
            <div class="card-header">
                <h3 class="card-title mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Deletion</h3>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this Jadwal Tayang?</p>
                <div class="alert alert-secondary">
                    <strong>{{ request_obj }}</strong><br>
                    <small class="text-muted">Created {{ request_obj.created_at|date:"d M Y H:i" }}</small>
                </div>
            </div>
            <div class="card-footer d-flex gap-2">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i> Yes, Delete
                    </button>
                </form>
                <a href="{% url 'jadwal_tayang_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
